<script>
let tg = window.Telegram.WebApp;

tg.ready();
tg.expand();

// ✅ правильное получение user (без fallback-хака)
const user = tg.initDataUnsafe?.user;

// ❗ если открыт НЕ в Telegram
if (!user) {
    document.getElementById("user").innerText =
        "❌ Откройте через Telegram WebApp";
} else {

    document.getElementById("user").innerText =
        user.first_name + " (ID: " + user.id + ")";

    // ❗ ВАЖНО: НЕ localhost
    fetch("https://bio-api.onrender.com/stats/" + user.id)
    .then(r => r.json())
    .then(data => {
        document.getElementById("right").innerText = data.right;
        document.getElementById("wrong").innerText = data.wrong;
        document.getElementById("percent").innerText = data.percent;
    })
    .catch(() => {
        document.getElementById("user").innerText =
            "❌ API не отвечает";
    });
}
</script>
