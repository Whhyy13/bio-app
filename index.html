<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    background: #0f172a;
    color: white;
    font-family: Arial;
    text-align: center;
}

.container {
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    margin: 15px;
    border-radius: 15px;
}

.title {
    font-size: 22px;
    margin-bottom: 10px;
}

.big {
    font-size: 28px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h1>👤 Профиль</h1>

<div class="card">
    <div id="user">Загрузка...</div>
</div>

<div class="card">
    <div class="title">Статистика</div>
    ✔ <span id="right">0</span><br>
    ❌ <span id="wrong">0</span><br><br>
    <div class="big">📈 <span id="percent">0</span>%</div>
</div>

</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

let user = tg.initDataUnsafe.user;

// если открыли НЕ через Telegram
if (!user) {
    document.getElementById("user").innerText = "❌ Открой через Telegram";
} else {

    // показываем пользователя
    document.getElementById("user").innerText =
        user.first_name + " (ID: " + user.id + ")";

    // 🔥 ЗАПРОС К API (с фикс ngrok)
    fetch("https://mousy-usher-explain.ngrok-free.dev/stats/" + user.id, {
        headers: {
            "ngrok-skip-browser-warning": "true"
        }
    })
    .then(r => r.json())
    .then(data => {
        document.getElementById("right").innerText = data.right;
        document.getElementById("wrong").innerText = data.wrong;
        document.getElementById("percent").innerText = data.percent;
    })
    .catch(() => {
        document.getElementById("user").innerText = "❌ Ошибка подключения к API";
    });
}
</script>

</body>
</html>
