<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Профиль</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    margin: 15px;
    border-radius: 15px;
}
</style>
</head>

<body>

<div class="container">
<h1>👤 Профиль</h1>

<div class="card">
    <div id="user">Загрузка...</div>
</div>

<div class="card">
    ✔ <span id="right">0</span><br>
    ❌ <span id="wrong">0</span><br><br>
    📈 <span id="percent">0</span>%
</div>
</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

let user = tg.initDataUnsafe?.user;

if (!user) {
    document.getElementById("user").innerText = "❌ Открой через Telegram";
} else {
    document.getElementById("user").innerText =
        user.first_name + " (ID: " + user.id + ")";

    fetch("http://localhost:8000/stats/" + user.id)
    .then(r => r.json())
    .then(data => {
        document.getElementById("right").innerText = data.right;
        document.getElementById("wrong").innerText = data.wrong;
        document.getElementById("percent").innerText = data.percent;
    });
}
</script>

</body>
</html>
