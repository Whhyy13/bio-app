<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Профиль</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #0f172a, #020617);
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    margin: 15px;
    border-radius: 20px;
}

.progress {
    height: 10px;
    background: #334155;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 10px;
}

.bar {
    height: 100%;
    width: 0%;
    background: #22c55e;
}
</style>
</head>

<body>

<div class="container">
<h1>👤 Профиль</h1>

<div class="card">
    <div id="user">Загрузка...</div>
</div>

<div class="card">
    ✔ <span id="right">0</span><br>
    ❌ <span id="wrong">0</span><br><br>
    📈 <span id="percent">0</span>%

    <div class="progress">
        <div class="bar" id="bar"></div>
    </div>
</div>
</div>

<script>
let tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

// 🔥 ПАРСИНГ initData
function getUserFromInitData() {
    let initData = tg.initData;

    if (!initData) return null;

    let params = new URLSearchParams(initData);
    let userStr = params.get("user");

    if (!userStr) return null;

    return JSON.parse(userStr);
}

let user = getUserFromInitData();

if (!user) {
    document.getElementById("user").innerText = "❌ Telegram не передал данные";
} else {

    document.getElementById("user").innerText =
        user.first_name + " (ID: " + user.id + ")";

    fetch("http://localhost:8000/stats/" + user.id)
    .then(r => r.json())
    .then(data => {

        document.getElementById("right").innerText = data.right;
        document.getElementById("wrong").innerText = data.wrong;
        document.getElementById("percent").innerText = data.percent;

        document.getElementById("bar").style.width = data.percent + "%";
    })
    .catch(() => {
        document.getElementById("user").innerText = "❌ API не отвечает";
    });
}
</script>

</body>
</html>
